services:
  - type: web
    name: hometax-manual
    env: node
    plan: starter
    buildCommand: npm install && npx playwright install --with-deps chromium && npm run build
    startCommand: npm start
    disk:
      name: hometax-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
