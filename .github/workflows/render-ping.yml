name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Main Site Health
        run: |
          curl -L --fail --show-error --silent https://hometax-use.onrender.com/health > /dev/null

      - name: Ping Crawler API Health
        run: |
          curl -L --fail --show-error --silent https://hometax-crawler-api.onrender.com/health > /dev/null
