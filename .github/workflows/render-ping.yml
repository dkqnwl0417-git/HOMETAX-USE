name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Main Site
        run: |
          curl -L --silent --output /dev/null https://hometax-use.onrender.com

      - name: Ping Crawler API
        run: |
          curl -L --silent --output /dev/null https://hometax-crawler-api.onrender.com
