name: Hometax Auto Crawl

on:
  schedule:
    - cron: "0 0,6 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Main Site
        run: |
          curl -L --fail --show-error --silent https://hometax-use.onrender.com/health > /dev/null

      - name: Wake Crawler API
        run: |
          curl -L --fail --show-error --silent https://hometax-crawler-api.onrender.com/health > /dev/null

      - name: Wait for Render wake up
        run: |
          sleep 30

      - name: Call Main Site Crawl API
        run: |
          curl -L --fail --show-error --silent \
            -X POST "https://hometax-use.onrender.com/api/trpc/hometax.crawl" \
            -H "Content-Type: application/json" \
            --data '{}'
